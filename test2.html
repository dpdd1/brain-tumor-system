<!DOCTYPE html>
<html>
<head>
    <title>医学影像智能分析系统</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 0.5rem;
        }
        h1:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 3px;
            background: #2196F3;
            border-radius: 2px;
        }
        .container {
            display: flex;
            gap: 40px;
            margin-top: 40px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .upload-btn {
            display: inline-flex;
            align-items: center;
            padding: 14px 35px;
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .upload-btn[disabled] {
            background: #90CAF9;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .upload-btn:hover:not([disabled]) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33,150,243,0.3);
        }
        .model-selector {
            margin: 30px 0;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .model-btn {
            padding: 10px 30px;
            border-radius: 20px;
            border: 1px solid #2196F3;
            background: white;
            color: #2196F3;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            font-weight: 500;
        }
        .model-btn.active {
            background: #2196F3;
            color: white;
        }
        .model-btn.rapid {
            border-color: #4CAF50;
            color: #4CAF50;
        }
        .model-btn.rapid.active {
            background: #4CAF50;
            color: white;
        }
        .model-btn:hover {
            transform: translateY(-2px);
        }
        .threshold-control {
            margin: 25px 0;
            display: flex;
            gap: 25px;
            justify-content: center;
        }
        .threshold-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(33,150,243,0.08);
            padding: 12px 20px;
            border-radius: 30px;
        }
        .threshold-group label {
            font-size: 0.95em;
            color: #2c3e50;
            font-weight: 500;
        }
        .threshold-input {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #90CAF9;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        .threshold-input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 2px rgba(33,150,243,0.2);
        }
        .threshold-unit {
            color: #666;
            font-size: 0.9em;
        }
        .upload-section {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(33,150,243,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .drop-zone {
            border: 2px dashed #90CAF9;
            padding: 40px;
            text-align: center;
            color: #757575;
            margin-top: 20px;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 1.1em;
            background: rgba(233, 236, 239, 0.3);
        }
        .drop-zone.dragover {
            border-color: #2196F3;
            background-color: #E3F2FD;
        }
        .preview-img {
            max-width: 100%;
            margin-top: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: none;
            border: 2px solid rgba(33,150,243,0.1);
            transition: transform 0.3s;
            cursor: zoom-in;
        }
        .preview-img:hover {
            transform: scale(1.02);
        }
        .results {
            flex: 1;
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(33,150,243,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .result-section {
            margin-bottom: 30px;
        }
        .result-header {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .result-header::before {
            content: '';
            width: 6px;
            height: 24px;
            background: #2196F3;
            border-radius: 3px;
        }
        .result-item {
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #ffffff;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .result-item:hover {
            transform: translateX(5px);
            box-shadow: 2px 4px 12px rgba(0,0,0,0.06);
        }
        .malignancy.benign {
            background: #E8F5E9;
            color: #2E7D32;
            border-left-color: #4CAF50;
        }
        .malignancy.malignant {
            background: #FFEBEE;
            color: #C62828;
            border-left-color: #f44336;
        }
        .confidence-bar {
            margin-top: 12px;
            height: 8px;
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .confidence-progress {
            height: 100%;
            transition: width 0.5s ease-in-out;
            border-radius: 4px;
            box-shadow: inset 2px 0 4px rgba(0,0,0,0.05);
        }
        .position-info {
            font-size: 0.85em;
            margin-top: 12px;
            background: rgba(33,150,243,0.08);
            color: #1976D2;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
        }
        .medical-analysis {
            white-space: pre-wrap;
            line-height: 1.7;
            padding: 20px;
            background: rgba(33,150,243,0.05);
            border-left: 3px solid #2196F3;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 0.95em;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .preview-img {
                max-width: 90%;
                margin: 20px auto;
            }
            h1 {
                font-size: 2rem;
            }
            .threshold-control {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <h1>医学影像智能分析系统</h1>

    <!-- 阈值控制 -->
    <div class="threshold-control">
        <div class="threshold-group">
            <label>分类阈值：</label>
            <input type="number" id="clsThreshold" class="threshold-input"
                   min="0" max="100" step="1" value="50">
            <span class="threshold-unit">%</span>
        </div>
        <div class="threshold-group">
            <label>检测阈值：</label>
            <input type="number" id="detThreshold" class="threshold-input"
                   min="0" max="100" step="1" value="50">
            <span class="threshold-unit">%</span>
        </div>
    </div>

    <!-- 模型选择 -->
    <div class="model-selector">
        <div class="model-btn active" data-model="deepseek">DeepSeek 医学分析</div>
        <div class="model-btn" data-model="qwen">通义千问 医学分析</div>
        <div class="model-btn rapid" data-model="basic">快速分析</div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="upload-section">
            <div class="button-group">
                <label class="upload-btn">
                    📁 选择文件
                    <input type="file" id="fileInput" accept="image/png, image/jpeg" hidden>
                </label>
                <button class="upload-btn" id="detectBtn" disabled>开始检测</button>
            </div>

            <div class="drop-zone" id="dropZone">
                🖼️ 拖放文件到此处上传
                <div style="font-size: 0.9em; color: #999; margin-top: 12px;">支持格式：JPG, PNG, JPEG</div>
            </div>

            <div style="margin-top: 30px; display: grid; gap: 20px;" id="imageContainer">
                <img id="preview" class="preview-img">
                <img id="resultPreview" class="preview-img">
            </div>
        </div>

        <div class="results" id="resultsContainer"></div>
    </div>

    <script>
        const modelNames = {
            deepseek: 'DeepSeek',
            qwen: '通义千问',
            basic: '快速分析'
        };

        // DOM元素
        const fileInput = document.getElementById('fileInput');
        const detectBtn = document.getElementById('detectBtn');
        const dropZone = document.getElementById('dropZone');
        const preview = document.getElementById('preview');
        const resultPreview = document.getElementById('resultPreview');
        const loadingOverlay = document.getElementById('loading');
        const resultsContainer = document.getElementById('resultsContainer');
        const imageContainer = document.getElementById('imageContainer');
        const clsThreshold = document.getElementById('clsThreshold');
        const detThreshold = document.getElementById('detThreshold');

        let currentModel = 'deepseek';
        let selectedFile = null;

        // 模型切换
        document.querySelectorAll('.model-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentModel = this.dataset.model;
            });
        });

        // 文件处理
        fileInput.addEventListener('change', e => handleFileSelection(e.target.files[0]));

        // 拖放处理
        ['dragover', 'dragleave'].forEach(event => {
            dropZone.addEventListener(event, e => {
                e.preventDefault();
                dropZone.classList.toggle('dragover', event === 'dragover');
            });
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files[0]) handleFileSelection(files[0]);
        });

        function handleFileSelection(file) {
            if (!['image/jpg','image/png', 'image/jpeg'].includes(file.type)) {
                alert('支持JPG,PNG和JPEG格式的图片');
                return;
            }

            const reader = new FileReader();
            reader.onload = e => {
                imageContainer.style.gridTemplateColumns = '1fr';
                preview.src = e.target.result;
                preview.style.display = 'block';
                resultPreview.style.display = 'none';
                resultsContainer.innerHTML = '';
            };
            reader.readAsDataURL(file);

            selectedFile = file;
            detectBtn.disabled = false;
        }

        // 阈值输入验证
        [clsThreshold, detThreshold].forEach(input => {
            input.addEventListener('change', () => {
                let value = parseInt(input.value);
                if (isNaN(value)) value = 50;
                value = Math.min(100, Math.max(0, value));
                input.value = value;
            });
        });

        // 检测请求
        detectBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loadingOverlay.style.display = 'flex';
            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('model', currentModel);
                formData.append('cls_threshold', clsThreshold.value);
                formData.append('det_threshold', detThreshold.value);

                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error(`请求失败: ${response.status}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);
                showResults(data);

            } catch (error) {
                alert(`检测失败: ${error.message}`);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        });

        // 显示结果
        function showResults(data) {
            resultsContainer.style.opacity = 0;
            resultsContainer.style.transform = 'translateY(20px)';

            const resultHTML = `
                <div class="threshold-info" style="margin-bottom:20px;">
                    <div style="color:#666; background:#e3f2fd; padding:8px 15px; border-radius:20px; display:inline-flex; gap:15px; align-items:center;">
                        <div>⚙️ 当前阈值设置：</div>
                        <div>分类 <strong>${data.thresholds.classification}%</strong></div>
                        <div>检测 <strong>${data.thresholds.detection}%</strong></div>
                    </div>
                </div>

                <div class="model-info" style="margin-bottom:30px;color:#666;">
                    <span style="background:#e3f2fd; padding:6px 12px; border-radius:20px;">
                    🧠 分析模式：<strong style="color:${currentModel === 'basic' ? '4CAF50' : '1976D2'}">${modelNames[currentModel]}</strong>
                    </span>
                    ${currentModel === 'basic' ?
                    '<div style="margin-top:10px;color:#888;font-size:0.9em;">（基础检测模式不包含AI医学建议）</div>' : ''}
                </div>

                ${createSection('📊 良恶性分析', data.malignancy, true)}
                ${createSection('🔍 肿瘤检测结果', data.detections)}
                ${createSection('📈 类型概率分布', data.classifications)}
                ${currentModel !== 'basic' ? createAnalysis(data.medical_analysis) : ''}
            `;

            if (data.result_image) {
                imageContainer.style.gridTemplateColumns = '1fr 1fr';
                resultPreview.src = `/uploads/${data.result_image}`;
                resultPreview.style.display = 'block';
            }

            setTimeout(() => {
                resultsContainer.innerHTML = resultHTML;
                resultsContainer.style.opacity = 1;
                resultsContainer.style.transform = 'translateY(0)';
                resultsContainer.style.transition = 'all 0.4s ease-out';

                document.querySelectorAll('.result-item').forEach((item, index) => {
                    item.style.opacity = 0;
                    item.style.transform = 'translateX(-20px)';
                    setTimeout(() => {
                        item.style.opacity = 1;
                        item.style.transform = 'translateX(0)';
                        item.style.transition = `all 0.3s ease-out ${index*0.1}s`;
                    }, 50);
                });
            }, 100);
        }

        // 结果区块生成
        function createSection(title, items, isMalignancy = false) {
            if (!items?.length) return '';
            return `
                <div class="result-section">
                    <div class="result-header">${title}</div>
                    ${items.map(item => `
                        <div class="result-item ${isMalignancy ? `malignancy ${item.class}` : ''}">
                            <div class="result-header-line">
                                <span>${item.class}</span>
                                <strong>${isMalignancy ? item.display_prob : item.display_conf}</strong>
                            </div>
                            ${item.position ? `
                            <div class="position-info">
                                <span>坐标：(${item.position.x1}, ${item.position.y1}) → (${item.position.x2}, ${item.position.y2})</span>
                            </div>
                            ` : ''}
                            ${isMalignancy ? `
                            <div class="confidence-bar">
                                <div class="confidence-progress"
                                     style="width: ${item.probability * 100}%;
                                            background: ${item.class === '良性' ? '#4CAF50' : '#f44336'}">
                                </div>
                            </div>
                            <div style="margin-top:8px;font-size:0.9em;color:#666;">
                                ${getMalignancyTip(item.class)}
                            </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 医学建议生成
        function createAnalysis(content) {
            if (!content) return '';
            return `
                <div class="result-section">
                    <div class="result-header">📝 AI医学分析建议</div>
                    <div style="color:#666;margin-bottom:15px;font-size:0.9em;">
                        （以下建议基于${modelNames[currentModel]}生成，仅供参考）
                    </div>
                    <div class="medical-analysis">${content}</div>
                </div>
            `;
        }

        // 良恶性提示语
        function getMalignancyTip(type) {
            return {
                '良性': '建议每6个月复查MRI，观察肿瘤大小变化',
                '恶性': '建议立即联系神经外科医生进行进一步诊断'
            }[type] || '请咨询专业医生获取详细建议';
        }
    </script>
</body>
</html>
