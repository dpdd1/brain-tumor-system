<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑肿瘤医学诊断平台 - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-page">
    <!-- 动态背景容器 -->
    <div class="animated-background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
        <div class="shape shape5"></div>
        <div class="shape shape6"></div>
        
        <!-- 医学元素 -->
        <img src="{{ url_for('static', filename='images/brain-icon.svg') }}" class="medical-element brain-icon" alt="脑图标">
        <img src="{{ url_for('static', filename='images/dna-helix.svg') }}" class="medical-element dna-helix" alt="DNA双螺旋">
        <img src="{{ url_for('static', filename='images/ecg-line.svg') }}" class="medical-element ecg-line" alt="心电图">
        <img src="{{ url_for('static', filename='images/neuron.svg') }}" class="medical-element neuron" alt="神经元">
        <img src="{{ url_for('static', filename='images/molecule.svg') }}" class="medical-element molecule" alt="分子结构">
        
        <!-- 新增医学元素 -->
        <img src="{{ url_for('static', filename='images/brain-scan.svg') }}" class="medical-element brain-scan" alt="脑扫描">
        <img src="{{ url_for('static', filename='images/microscope.svg') }}" class="medical-element microscope" alt="显微镜">
        <img src="{{ url_for('static', filename='images/cell.svg') }}" class="medical-element cell" alt="细胞">
        <img src="{{ url_for('static', filename='images/medical-cross.svg') }}" class="medical-element medical-cross" alt="医疗十字">
        <img src="{{ url_for('static', filename='images/pulse.svg') }}" class="medical-element pulse" alt="脉搏">
        
        <!-- 粒子效果 -->
        <div class="particles-container" id="particles-js"></div>
    </div>
    
    <div class="login-container" id="loginForm">
        <div class="login-header">
            <div class="logo-icon"><i class="fas fa-brain"></i></div>
            <h1>登录</h1>
        </div>
        <form method="POST" action="/login">
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="用户名" required>
                </div>
            </div>
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="••••" required>
                    <span class="password-toggle"><i class="fas fa-eye"></i></span>
                </div>
            </div>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            <div class="form-group">
                <button type="submit" class="btn-login">登录 <i class="fas fa-sign-in-alt"></i></button>
                <button type="button" class="btn-switch" id="switchToRegister">注册账号 <i class="fas fa-user-plus"></i></button>
            </div>
        </form>
    </div>
    
    <div class="login-container register-container" id="registerForm" style="display: none;">
        <div class="login-header">
            <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
            <h1>注册账号</h1>
        </div>
        <form id="registerFormElement">
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="reg-username" name="username" placeholder="设置用户名" required>
                </div>
            </div>
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-password" name="password" placeholder="设置密码" required>
                    <span class="password-toggle reg-password-toggle"><i class="fas fa-eye"></i></span>
                </div>
            </div>
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="确认密码" required>
                </div>
            </div>
            <div id="register-message"></div>
            <div class="form-group">
                <button type="button" class="btn-register" id="registerBtn">注册 <i class="fas fa-user-plus"></i></button>
                <button type="button" class="btn-switch" id="switchToLogin">返回登录 <i class="fas fa-arrow-left"></i></button>
            </div>
        </form>
    </div>
    
    <!-- 添加粒子效果JS -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/particles-config.js') }}"></script>
</body>
</html>
