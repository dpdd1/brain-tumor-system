<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑肿瘤医学诊断平台 - 肿瘤分割</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="inner-page">
    <!-- 页面背景效果 -->
    <div class="page-background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="particles-container" id="particles-js"></div>
    </div>

    <header>
        <div class="logo">
            <i class="fas fa-brain logo-icon"></i>
            <span class="logo-title">脑肿瘤医学诊断平台</span>
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('diagnosis') }}"><i class="fas fa-stethoscope"></i> 肿瘤诊断</a></li>
                <li class="active"><a href="{{ url_for('segmentation') }}"><i class="fas fa-crop-alt"></i> 肿瘤分割</a></li>
                <li><a href="{{ url_for('analysis') }}"><i class="fas fa-brain"></i> 脑部检测</a></li>
                <li><a href="{{ url_for('records') }}"><i class="fas fa-clipboard-list"></i> 治疗记录</a></li>
                <li class="user-profile">
                    <img src="{{ url_for('static', filename='images/user-avatar.png') }}" alt="用户头像">
                    <span class="user-name">{{ session.get('username', '用户') }}</span>
                </li>
                <li><a href="{{ url_for('logout') }}" class="logout-btn"><i class="fas fa-sign-out-alt"></i> 退出登录</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="segmentation-container card-container">
            <div class="card-header">
                <i class="fas fa-crop-alt card-icon"></i>
            <h2>脑肿瘤分割</h2>
            </div>
            
            <div class="segmentation-content">
                <!-- 上传区域 -->
                <div class="upload-section card-section">
                    <h3><i class="fas fa-upload"></i> 上传脑部CT</h3>
                    <form action="/upload_segmentation" method="post" enctype="multipart/form-data" id="segmentation-form">
                        <div class="file-upload-btn">
                            <input type="file" name="file" id="file-upload" accept=".jpg,.jpeg,.png" onchange="previewImage(this, 'original-image')">
                            <label for="file-upload"><i class="fas fa-file-medical"></i> 选择文件</label>
                        </div>
                        <div class="action-buttons">
                            <button type="submit" class="btn-primary"><i class="fas fa-cut"></i> 开始分割</button>
                            <button type="button" class="btn-secondary" id="clear-upload"><i class="fas fa-times"></i> 清除</button>
                        </div>
                    </form>
                    <div class="upload-info">
                        <p><i class="fas fa-info-circle"></i> 支持JPG、JPEG、PNG格式的脑部CT图像</p>
                    </div>
                </div>
                
                <!-- 图像对比区域 -->
                <div class="comparison-container">
                    <div class="comparison-column">
                        <div class="comparison-header">
                            <h3><i class="fas fa-image"></i> 原始图像</h3>
                        </div>
                        <div class="original-image card-section">
                        <div class="image-container">
                                <div class="upload-preview">
                                    <img id="original-image" src="">
                                    <div class="preview-overlay">
                                        <i class="fas fa-brain fa-3x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="comparison-column">
                        <div class="comparison-header">
                            <h3><i class="fas fa-object-group"></i> 分割结果</h3>
                        </div>
                        <div class="segmented-image card-section">
                        <div class="image-container">
                                <img id="segmented-image" src="{% if result %}{{ result.segmentation_image }}{% else %}{% endif %}">
                                <div class="preview-overlay">
                                    <i class="fas fa-layer-group"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 参数调整区域 -->
                <div class="segmentation-controls-container card-section">
                    <h3 class="controls-title"><i class="fas fa-sliders-h"></i> 分割参数调整</h3>
                    <div class="segmentation-controls">
                        <div class="control-label">
                            <i class="fas fa-percentage"></i>
                            <span>分割阈值：</span>
                        </div>
                        <div class="slider-container">
                        <input type="range" id="threshold-slider" min="0" max="100" value="50" class="slider">
                        <div class="threshold-value">50%</div>
                        </div>
                    </div>
                    
                    <div class="segmentation-controls">
                        <div class="control-label">
                            <i class="fas fa-filter"></i>
                            <span>高斯滤波：</span>
                        </div>
                        <div class="slider-container">
                        <input type="range" id="gaussian-slider" min="0" max="15" value="0" class="slider">
                        <div class="gaussian-value">0</div>
                        </div>
                    </div>
                    
                    <div class="segmentation-controls">
                        <div class="control-label">
                            <i class="fas fa-adjust"></i>
                            <span>对比度调整：</span>
                        </div>
                        <div class="slider-container">
                        <input type="range" id="contrast-slider" min="30" max="200" value="100" class="slider">
                        <div class="contrast-value">100%</div>
                        </div>
                    </div>
                </div>
                
                <!-- 详细结果区域 -->
                <div class="segmentation-results card-section">
                    <div class="result-section">
                        <h3><i class="fas fa-chart-pie"></i> 分割结果图</h3>
                        <div class="result-images">
                            <div class="result-image">
                                <div class="result-image-wrapper">
                                    <img id="mask-image" src="{% if result %}{{ result.mask_image }}{% else %}{% endif %}">
                                    <div class="image-overlay">
                                        <i class="fas fa-mask"></i>
                                    </div>
                                </div>
                                <div class="image-label">肿瘤掩码</div>
                            </div>
                            <div class="result-image">
                                <div class="result-image-wrapper">
                                    <img id="overlay-image" src="{% if result %}{{ result.overlay_image }}{% else %}{% endif %}">
                                    <div class="image-overlay">
                                        <i class="fas fa-layer-group"></i>
                                    </div>
                                </div>
                                <div class="image-label">叠加图像</div>
                            </div>
                        </div>
                    </div>
                    {% if result and result.error %}
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>{{ result.error }}</p>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/particles-config.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 滑块值显示
            const thresholdSlider = document.getElementById('threshold-slider');
            const thresholdValue = document.querySelector('.threshold-value');
            thresholdSlider.addEventListener('input', function() {
                thresholdValue.textContent = this.value + '%';
                updateSegmentation();
            });
            
            const gaussianSlider = document.getElementById('gaussian-slider');
            const gaussianValue = document.querySelector('.gaussian-value');
            gaussianSlider.addEventListener('input', function() {
                gaussianValue.textContent = this.value;
                updateSegmentation();
            });
            
            const contrastSlider = document.getElementById('contrast-slider');
            const contrastValue = document.querySelector('.contrast-value');
            contrastSlider.addEventListener('input', function() {
                contrastValue.textContent = this.value + '%';
                updateSegmentation();
            });
            
            // 清除上传图片
            document.getElementById('clear-upload').addEventListener('click', function() {
                document.getElementById('file-upload').value = '';
                document.getElementById('original-image').src = "";
                document.getElementById('segmented-image').src = "";
                document.getElementById('mask-image').src = "";
                document.getElementById('overlay-image').src = "";
                
                // 显示覆盖层
                document.querySelectorAll('.preview-overlay').forEach(overlay => {
                    overlay.style.opacity = '1';
                });
                
                document.querySelectorAll('.image-overlay').forEach(overlay => {
                    overlay.style.opacity = '1';
                });
            });
            
            // 添加卡片动画效果
            const cardSections = document.querySelectorAll('.card-section');
            cardSections.forEach((section, index) => {
                setTimeout(() => {
                    section.classList.add('fade-in');
                }, index * 100);
            });
            
            // 图片加载时隐藏覆盖层
            const originalImage = document.getElementById('original-image');
            originalImage.addEventListener('load', function() {
                if (this.src) {
                    this.parentElement.querySelector('.preview-overlay').style.opacity = '0';
                } else {
                    this.parentElement.querySelector('.preview-overlay').style.opacity = '1';
                }
            });
            
            const segmentedImage = document.getElementById('segmented-image');
            segmentedImage.addEventListener('load', function() {
                if (this.src) {
                    this.parentElement.querySelector('.preview-overlay').style.opacity = '0';
                } else {
                    this.parentElement.querySelector('.preview-overlay').style.opacity = '1';
                }
            });
            
            // 表单提交时显示加载动画
            document.getElementById('segmentation-form').addEventListener('submit', function() {
                const submitBtn = this.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中...';
                submitBtn.disabled = true;
            });
        });
        
        // 图像预览功能
        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                
                reader.onload = function(e) {
                    document.getElementById(previewId).src = e.target.result;
                }
                
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 更新分割结果（模拟）
        function updateSegmentation() {
            // 这里只是模拟效果，实际应用中可能需要发送AJAX请求到后端进行实时分割
            console.log('更新分割参数');
        }
    </script>
</body>
</html>
