<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑肿瘤医学诊断平台 - 脑部检测</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="inner-page">
    <!-- 页面背景效果 -->
    <div class="page-background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="particles-container" id="particles-js"></div>
    </div>

    <header>
        <div class="logo">
            <i class="fas fa-brain logo-icon"></i>
            <span class="logo-title">脑肿瘤医学诊断平台</span>
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('diagnosis') }}"><i class="fas fa-stethoscope"></i> 肿瘤诊断</a></li>
                <li><a href="{{ url_for('segmentation') }}"><i class="fas fa-crop-alt"></i> 肿瘤分割</a></li>
                <li class="active"><a href="{{ url_for('analysis') }}"><i class="fas fa-brain"></i> 脑部检测</a></li>
                <li><a href="{{ url_for('records') }}"><i class="fas fa-clipboard-list"></i> 治疗记录</a></li>
                <li class="user-profile">
                    <img src="{{ url_for('static', filename='images/user-avatar.png') }}" alt="用户头像">
                    <span class="user-name">{{ session.get('username', '用户') }}</span>
                </li>
                <li><a href="{{ url_for('logout') }}" class="logout-btn"><i class="fas fa-sign-out-alt"></i> 退出登录</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="analysis-container card-container">
            <div class="card-header">
                <i class="fas fa-brain card-icon"></i>
                <h2>脑部检测 - 智能分析系统</h2>
            </div>
            
            <div class="model-selector card-section">
                <button class="model-btn active" data-model="deepseek">
                    <i class="fas fa-robot"></i> DeepSeek 医学分析
                </button>
                <button class="model-btn" data-model="qwen">
                    <i class="fas fa-microchip"></i> 通义千问 医学分析
                </button>
            </div>

            <div class="loading-overlay" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="analysis-content">
                <div class="upload-section card-section">
                    <h3><i class="fas fa-upload"></i> 上传脑部CT</h3>
                    <div class="file-upload-btn">
                        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg" onchange="previewImage(this, 'preview')">
                        <label for="fileInput"><i class="fas fa-file-medical"></i> 选择文件</label>
                    </div>
                    <button class="btn-primary" id="detectBtn" disabled><i class="fas fa-search"></i> 开始检测</button>
                    
                    <div class="drop-zone" id="dropZone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>拖放文件到此处上传</p>
                    </div>

                    <div class="image-preview-container">
                        <div class="image-preview-wrapper">
                            <img id="preview" class="preview-img" src="">
                            <div class="preview-overlay">
                                <i class="fas fa-brain fa-3x"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="results-section card-section" id="resultsContainer">
                    <h3><i class="fas fa-chart-bar"></i> 分析结果</h3>
                    <div class="empty-results">
                        <i class="fas fa-search"></i>
                        <p>上传图像并点击"开始检测"查看分析结果</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/particles-config.js') }}"></script>
    <script>
        // DOM元素
        const fileInput = document.getElementById('fileInput');
        const detectBtn = document.getElementById('detectBtn');
        const dropZone = document.getElementById('dropZone');
        const preview = document.getElementById('preview');
        const loadingOverlay = document.getElementById('loading');
        const resultsContainer = document.getElementById('resultsContainer');
        const previewOverlay = document.querySelector('.preview-overlay');

        // 状态变量
        let currentModel = 'deepseek';
        let selectedFile = null;

        // 模型切换
        document.querySelectorAll('.model-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentModel = this.dataset.model;
            });
        });

        // 拖放处理
        ['dragover', 'dragleave', 'dragenter'].forEach(event => {
            dropZone.addEventListener(event, e => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.toggle('dragover', event === 'dragover' || event === 'dragenter');
            });
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files[0]) handleFileSelection(files[0]);
        });

        // 文件选择处理函数
        function handleFileSelection(file) {
            // 验证文件类型
            if (!['image/jpg','image/png', 'image/jpeg'].includes(file.type)) {
                alert('支持JPG、PNG和JPEG格式的图片');
                return;
            }

            // 预览图片
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                previewOverlay.style.opacity = '0';
                resultsContainer.innerHTML = `
                    <h3><i class="fas fa-chart-bar"></i> 分析结果</h3>
                    <div class="empty-results">
                        <i class="fas fa-search"></i>
                        <p>上传图像并点击"开始检测"查看分析结果</p>
                    </div>
                `;
            };
            reader.readAsDataURL(file);

            // 保存文件并启用检测按钮
            selectedFile = file;
            detectBtn.disabled = false;
        }

        // 图像预览功能
        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                handleFileSelection(input.files[0]);
            }
        }

        // 开始检测
        detectBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loadingOverlay.style.display = 'flex';
            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('model', currentModel);

                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error(`请求失败: ${response.status}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);
                showResults(data);

            } catch (error) {
                alert(`检测失败: ${error.message}`);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        });

        // 结果显示函数
        function showResults(data) {
            const resultHTML = `
                <h3><i class="fas fa-chart-bar"></i> 分析结果</h3>
                <div class="model-info">
                    <i class="fas fa-robot"></i> 分析模型：<strong>${currentModel === 'deepseek' ? 'DeepSeek' : '通义千问'}</strong>
                </div>
                ${createSection('📊 良恶性分析', data.malignancy, true)}
                ${createSection('🔍 肿瘤检测结果', data.detections)}
                ${createSection('📈 类型概率分布', data.classifications)}
                ${createAnalysis(data.medical_analysis)}
            `;

            resultsContainer.innerHTML = resultHTML;
            
            // 添加卡片动画效果
            const resultSections = document.querySelectorAll('.result-section');
            resultSections.forEach((section, index) => {
                setTimeout(() => {
                    section.classList.add('fade-in');
                }, index * 100);
            });
        }

        // 辅助函数：创建结果区块
        function createSection(title, items, isMalignancy = false) {
            if (!items?.length) return '';
            return `
                <div class="result-section">
                    <div class="result-header">${title}</div>
                    ${items.map(item => `
                        <div class="result-item ${isMalignancy ? `malignancy ${item.class}` : ''}">
                            <div class="result-header-line">
                                <span>${item.class}</span>
                                <strong>${isMalignancy ? item.display_prob : item.display_conf}</strong>
                            </div>
                            ${isMalignancy ? `
                            <div class="confidence-bar">
                                <div class="confidence-progress"
                                     style="width: ${item.probability * 100}%;
                                            background: ${item.class === '良性' ? '#4CAF50' : '#f44336'}">
                                </div>
                            </div>
                            <div class="malignancy-tip">${getMalignancyTip(item.class)}</div>
                            ` : ''}
                            ${item.position ? `
                            <div class="position-info">
                                <span>坐标：(${item.position.x1}, ${item.position.y1}) → (${item.position.x2}, ${item.position.y2})</span>
                            </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 辅助函数：创建医学分析
        function createAnalysis(content) {
            if (!content) return '';
            return `
                <div class="result-section">
                    <div class="result-header">📝 医学分析建议</div>
                    <div class="medical-analysis">${content}</div>
                </div>
            `;
        }

        // 辅助函数：获取良恶性提示
        function getMalignancyTip(type) {
            return {
                '良性': '建议每6个月复查MRI，观察肿瘤大小变化',
                '恶性': '建议立即联系神经外科医生进行进一步诊断'
            }[type] || '请咨询专业医生获取详细建议';
        }
        
        // 添加卡片动画效果
        document.addEventListener('DOMContentLoaded', function() {
            const cardSections = document.querySelectorAll('.card-section');
            cardSections.forEach((section, index) => {
                setTimeout(() => {
                    section.classList.add('fade-in');
                }, index * 100);
            });
        });
    </script>
</body>
</html>
